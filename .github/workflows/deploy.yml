name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd /opt/s-tools
          GIT_SSH_COMMAND="ssh -i /root/.ssh/github_deploy" git fetch origin
          GIT_SSH_COMMAND="ssh -i /root/.ssh/github_deploy" git checkout main
          GIT_SSH_COMMAND="ssh -i /root/.ssh/github_deploy" git reset --hard origin/main
          cd node
          npm ci --no-audit --no-fund
          cd client
          npm ci --no-audit --no-fund
          npm run build
          pm2 restart rewrite-app --update-env
          pm2 save
          echo "deployed: $(git -C /opt/s-tools rev-parse --short HEAD)"
          REMOTE
